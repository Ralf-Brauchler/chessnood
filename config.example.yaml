# chessnood configuration.
# Copy to config.yaml and edit. The running service watches this file and
# reloads engine settings live (no restart needed) at the start of each turn.

engine:
  path: stockfish        # path to a UCI engine binary (Stockfish recommended)
  skill_level: 5         # 0-20. Lower = weaker / more "human". Good start for a casual player.
  move_time_ms: 800      # how long the computer is allowed to think per move
  elo_limit: null        # set e.g. 1200 to cap strength by Elo (uses UCI_LimitStrength)
  threads: 1             # keep at 1 on a 1 GB Pi
  hash_mb: 32            # engine hash table; keep small on a 1 GB Pi

board:
  backend: usb           # usb = real board over USB cable | mock = no hardware (for testing)
  settle_ms: 1000        # a move counts only after the board is stable this long;
                         # ignores pieces slid over intermediate squares. Lower = snappier.
  beeps: true            # short tones on the board: your turn / wrong move / game over
  capture_signal: true   # when the computer captures, flash a cross through the
                         # target square as the piece is lifted, then the target LED
  stale_timeout_s: 0     # 0 = off. >0: reconnect if no board report arrives for this
                         # long (recovers a wedged-but-still-plugged board). Enable
                         # only once confirmed the board streams continuously.

game:
  human_color: white     # which colour your father plays: white | black

display:                 # the 3.5" SPI touchscreen (MHS-3.5): status + "Neue Partie" button
  backend: auto          # auto | framebuffer | console | preview | none
                         #   auto = framebuffer if fb_device exists, else console
  fb_device: /dev/fb1    # SPI TFT framebuffer device
  touch_device: null     # evdev path for the touch panel; null = auto-detect
  rotate: 0              # 0 | 90 | 180 | 270 — screen orientation
  preview_path: ./chessnood-screen.png   # where the "preview" backend writes

log_level: info          # debug | info | warning | error
status_file: ./chessnood-status.json   # `chessnood status` reads this file
